name: Weekly Energy Summary

on:
  schedule:
    # GitHub Actions cron is always UTC, but Pacific time shifts between
    # PST (UTC-8) and PDT (UTC-7) depending on daylight saving. To land on
    # 5:00pm Pacific year-round, we schedule for BOTH possible UTC times
    # and let the "Determine whether to run" step below skip the one that
    # doesn't actually correspond to 5:00pm Pacific that week.
    - cron: "0 0 * * 1"  # 5:00pm Sunday PDT  (daylight saving, ~Mar-Nov) -> Monday 00:00 UTC
    - cron: "0 1 * * 1"  # 5:00pm Sunday PST  (standard time, ~Nov-Mar)  -> Monday 01:00 UTC
  workflow_dispatch: {}  # lets you trigger a run manually from the Actions tab, any time

jobs:
  send-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Determine whether to run
        id: check
        env:
          TRIGGERING_CRON: ${{ github.event.schedule }}
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # GitHub Actions doesn't guarantee runs fire exactly on time -
          # under load, a scheduled run can be delayed by minutes or even
          # hours. So rather than checking the CURRENT wall-clock hour
          # (which breaks the moment a run is delayed past it), we check
          # which SEASON it is (PDT vs PST) and match that against which of
          # the two cron entries actually triggered this run. That stays
          # correct no matter how late the run fires.
          PDT_CRON="0 0 * * 1"  # intended for 5:00pm Sunday PDT
          PST_CRON="0 1 * * 1"  # intended for 5:00pm Sunday PST
          current_zone=$(TZ="America/Los_Angeles" date +%Z)

          if [ "$current_zone" = "PDT" ] && [ "$TRIGGERING_CRON" = "$PDT_CRON" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ "$current_zone" = "PST" ] && [ "$TRIGGERING_CRON" = "$PST_CRON" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping this trigger ('$TRIGGERING_CRON'): current Pacific zone is $current_zone, which is handled by the other cron entry."
          fi

      - name: Check out repo
        if: steps.check.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.check.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.check.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Run weekly energy summary
        if: steps.check.outputs.should_run == 'true'
        env:
          PYTHONUNBUFFERED: "1"
          EMPORIA_EMAIL: ${{ secrets.EMPORIA_EMAIL }}
          EMPORIA_PASSWORD: ${{ secrets.EMPORIA_PASSWORD }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: python -u weekly_energy_summary.py
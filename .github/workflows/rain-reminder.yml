name: Rain Reminder

on:
  schedule:
    # Same DST-safe pattern as the energy summary workflow: GitHub Actions
    # cron is always UTC, so we schedule both possible UTC times for 6:00pm
    # Pacific and let the "Determine whether to run" step skip whichever one
    # doesn't apply for the current time of year.
    - cron: "0 1 * * *"  # 6:00pm PDT (daylight saving, ~Mar-Nov) -> 01:00 UTC next day
    - cron: "0 2 * * *"  # 6:00pm PST (standard time, ~Nov-Mar)  -> 02:00 UTC next day
  workflow_dispatch: {}  # lets you trigger a run manually from the Actions tab, any time

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Determine whether to run
        id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          hour=$(TZ="America/Los_Angeles" date +%H)
          if [ "$hour" = "18" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping this trigger: it's ${hour}:00 Pacific right now, not the intended 18:00 (the other scheduled cron entry handles this half of the year)."
          fi

      - name: Check out repo
        if: steps.check.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.check.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.check.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Run rain reminder
        if: steps.check.outputs.should_run == 'true'
        env:
          PYTHONUNBUFFERED: "1"
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          RAIN_SLACK_CHANNEL_ID: ${{ secrets.RAIN_SLACK_CHANNEL_ID }}
        run: python -u rain_reminder.py
